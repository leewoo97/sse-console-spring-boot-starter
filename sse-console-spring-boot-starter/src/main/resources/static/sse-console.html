<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>SSE / API Test Console</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:#fafafa; padding:16px; color:#333; }
    h2 { margin-bottom:6px; }
    .hint { font-size:13px; color:#666; margin-bottom:16px; }
    .filter-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .filter-tab { padding:6px 16px; font-size:13px; border-radius:20px; border:1px solid #d1d5db; background:#fff; cursor:pointer; color:#374151; }
    .filter-tab.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .endpoint { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:16px; margin-bottom:18px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
    .endpoint.sse-type  { border-left:4px solid #2563eb; }
    .endpoint.http-type { border-left:4px solid #16a34a; }
    .header { margin-bottom:10px; }
    .tag { font-size:12px; color:#2563eb; margin-bottom:4px; }
    .summary-row { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .method { font-weight:700; font-size:12px; padding:4px 8px; border-radius:4px; background:#2563eb; color:#fff; }
    .method.GET    { background:#16a34a; }
    .method.POST   { background:#2563eb; }
    .method.PUT    { background:#d97706; }
    .method.DELETE { background:#dc2626; }
    .method.PATCH  { background:#7c3aed; }
    .type-badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; }
    .type-badge.sse  { background:#dbeafe; color:#1d4ed8; }
    .type-badge.http { background:#dcfce7; color:#15803d; }
    .summary { font-size:16px; font-weight:600; }
    .path { font-family:monospace; font-size:13px; color:#374151; background:#f3f4f6; padding:4px 6px; border-radius:4px; display:inline-block; }
    .section-title { margin-top:14px; margin-bottom:6px; font-size:13px; font-weight:600; color:#374151; }
    textarea { width:100%; height:130px; font-family:monospace; font-size:13px; padding:8px; border-radius:6px; border:1px solid #d1d5db; background:#f9fafb; resize:vertical; box-sizing:border-box; }
    .actions { display:flex; gap:8px; margin-top:10px; }
    button { flex:1; padding:8px; font-size:13px; border-radius:6px; cursor:pointer; }
    .btn-send       { background:#2563eb; color:#fff; border:none; }
    .btn-send.http  { background:#16a34a; }
    .btn-disconnect { background:#fff; color:#374151; border:1px solid #d1d5db; }
    .console-wrapper { position:relative; margin-top:12px; }
    .console-clear {
      position:absolute; top:6px; right:8px; z-index:10;
      padding:4px 8px; font-size:11px; border-radius:4px;
      background:rgba(255,255,255,0.9); border:1px solid #d1d5db;
      cursor:pointer; display:none; flex:unset;
    }
    .log-status { font-size:12px; color:#6b7280; margin-top:4px; min-height:16px; }

    /* ── 가상 스크롤 ── */
    .log-container {
      position: relative;          /* 자식 absolute 기준점 */
      background: #111827;
      color: #22c55e;
      border-radius: 6px;
      height: 260px;
      overflow-y: auto;
      overflow-x: auto;
      resize: vertical;
      font-family: monospace;
      font-size: 12px;
      width: 100%;
      box-sizing: border-box;
    }
    .log-container.http-log { background:#1e293b; color:#94a3b8; }

    /* 스크롤바 높이 확보용 투명 spacer */
    .log-spacer {
      position: absolute;
      top: 0; left: 0;
      width: 1px;
      pointer-events: none;
    }

    /* 각 줄 — position:absolute 로 컨테이너 기준 배치 */
    .log-line {
      position: absolute;
      left: 0; right: 0;
      padding: 0 12px;
      white-space: pre;
      line-height: 18px;
      box-sizing: border-box;
    }

    .timeline { margin-top:14px; padding-left:12px; border-left:2px solid #e5e7eb; display:none; }
    .timeline-item { position:relative; margin-bottom:10px; padding-left:14px; font-size:12px; cursor:pointer; }
    .timeline-item::before { content:""; position:absolute; left:-7px; top:3px; width:8px; height:8px; background:#2563eb; border-radius:50%; }
    .timeline-item.loading::before  { background:#f59e0b; }
    .timeline-item.response::before { background:#16a34a; }
    .timeline-item.error::before    { background:#dc2626; }
    .timeline-item.closed::before   { background:#9ca3af; }
    .timeline-item.active { font-weight:600; }
  </style>
</head>
<body>

<h2>SSE / API Test Console</h2>
<div class="hint">SSE 스트리밍 엔드포인트와 일반 HTTP API를 모두 테스트할 수 있습니다.</div>

<div class="filter-tabs">
  <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
  <button class="filter-tab" onclick="setFilter('sse',this)">SSE Only</button>
  <button class="filter-tab" onclick="setFilter('http',this)">HTTP Only</button>
</div>

<div id="endpoints"></div>

<script>
const LINE_H  = 18;
const OVERSCAN = 8;

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let allEndpoints  = [];
let currentFilter = 'all';
let refreshKey    = 0;

const logBuffers  = {};
const connections = {};
const eventStore  = {};

document.addEventListener("DOMContentLoaded", loadApiList);

async function loadApiList() {
  const res = await fetch("/sse-console/api-list?_=" + Date.now(), { cache:"no-store" });
  allEndpoints = await res.json();
  renderEndpoints(allEndpoints);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderEndpoints(allEndpoints);
}

function renderEndpoints(endpoints) {
  const root = document.getElementById("endpoints");
  root.innerHTML = "";
  const list = currentFilter === 'all' ? endpoints : endpoints.filter(e => e.type === currentFilter);

  list.forEach((ep, idx) => {
    eventStore[idx] = [];
    logBuffers[idx] = [];

    const isSse   = ep.type === 'sse';
    const example = buildExample(ep.parameters);
    const pathHint = ep.parameters.filter(p => p.in === 'path')
      .map(p => `<code>{${escapeHtml(p.name)}}</code>`).join(', ');

    const div = document.createElement('div');
    div.className = `endpoint ${isSse ? 'sse-type' : 'http-type'}`;
    div.innerHTML = `
      <div class="header">
        <div class="tag">${escapeHtml(ep.tag)}</div>
        <div class="summary-row">
          <span class="method ${escapeHtml(ep.method)}">${escapeHtml(ep.method)}</span>
          <span class="type-badge ${escapeHtml(ep.type)}">${escapeHtml(ep.type).toUpperCase()}</span>
          <span class="summary">${escapeHtml(ep.summary)}</span>
        </div>
        <div class="path">${escapeHtml(ep.path)}</div>
        ${pathHint ? `<div style="font-size:12px;color:#6b7280;margin-top:4px;">Path variables: ${pathHint}</div>` : ''}
      </div>

      <div class="section-title">Parameters (JSON)</div>
      <textarea id="body-${idx}">${escapeHtml(JSON.stringify(example, null, 2))}</textarea>

      <div class="actions">
        <button class="${isSse ? 'btn-send' : 'btn-send http'}"
                data-idx="${idx}" data-path="${escapeHtml(ep.path)}" data-method="${escapeHtml(ep.method)}" data-type="${isSse ? 'sse' : 'http'}">
          ${isSse ? 'Try it out (Stream)' : 'Send Request'}
        </button>
        ${isSse ? `<button class="btn-disconnect" data-disconnect="${idx}">Disconnect</button>` : ''}
      </div>

      <div class="console-wrapper">
        <button class="console-clear" id="clear-${idx}" onclick="clearLog(${idx})">Clear</button>
        <div class="log-status" id="log-status-${idx}"></div>
        <div class="log-container ${isSse ? '' : 'http-log'}" id="log-box-${idx}">
          <div class="log-spacer" id="log-spacer-${idx}"></div>
        </div>
      </div>

      <div class="timeline" id="timeline-${idx}"></div>
    `;
    root.appendChild(div);

    // onclick 이벤트를 data 속성 기반으로 연결 (XSS 방지)
    div.querySelector('[data-idx]').addEventListener('click', function() {
      const i = parseInt(this.dataset.idx, 10);
      const p = this.dataset.path;
      const m = this.dataset.method;
      if (this.dataset.type === 'sse') sseConnect(i, p, m);
      else httpSend(i, p, m);
    });
    const discBtn = div.querySelector('[data-disconnect]');
    if (discBtn) discBtn.addEventListener('click', function() {
      disconnect(parseInt(this.dataset.disconnect, 10));
    });

    document.getElementById(`log-box-${idx}`)
      .addEventListener('scroll', () => repaint(idx), { passive: true });
  });
}

// ── 가상 스크롤 ──────────────────────────────────────────
function appendLog(idx, text) {
  if (!logBuffers[idx]) logBuffers[idx] = [];
  logBuffers[idx].push(...text.split('\n'));
  repaint(idx, true);
}

function repaint(idx, autoScroll = false) {
  const lines  = logBuffers[idx] || [];
  const box    = document.getElementById(`log-box-${idx}`);
  const spacer = document.getElementById(`log-spacer-${idx}`);
  if (!box || !spacer) return;

  const totalH = lines.length * LINE_H;
  spacer.style.height = totalH + 'px';

  if (autoScroll) box.scrollTop = totalH;

  const scrollTop = box.scrollTop;
  const viewH     = box.clientHeight;
  const first     = Math.max(0, Math.floor(scrollTop / LINE_H) - OVERSCAN);
  const last      = Math.min(lines.length, Math.ceil((scrollTop + viewH) / LINE_H) + OVERSCAN);

  // 기존 .log-line 제거 후 보이는 범위만 새로 그림
  box.querySelectorAll('.log-line').forEach(el => el.remove());

  const frag = document.createDocumentFragment();
  for (let i = first; i < last; i++) {
    const el = document.createElement('div');
    el.className = 'log-line';
    el.style.top = (i * LINE_H) + 'px';
    el.textContent = lines[i] ?? '';
    frag.appendChild(el);
  }
  box.appendChild(frag);
}

// ── HTTP 요청 ─────────────────────────────────────────────
async function httpSend(idx, path, method) {
  let body;
  try { body = JSON.parse(document.getElementById(`body-${idx}`).value); }
  catch { alert("Invalid JSON"); return; }

  logBuffers[idx] = [];
  repaint(idx);
  document.getElementById(`clear-${idx}`).style.display = 'block';
  const statusEl = document.getElementById(`log-status-${idx}`);

  let resolvedPath = path;
  const queryParams = {};
  for (const [k, v] of Object.entries(body)) {
    if (resolvedPath.includes(`{${k}}`)) resolvedPath = resolvedPath.replace(`{${k}}`, encodeURIComponent(v));
    else queryParams[k] = v;
  }

  const isBody = ["POST","PUT","PATCH"].includes(method.toUpperCase());
  let url = resolvedPath;
  const opts = { method: method.toUpperCase() };
  if (isBody) {
    opts.headers = { "Content-Type": "application/json" };
    opts.body = JSON.stringify(queryParams);
  } else {
    const qs = new URLSearchParams(queryParams);
    if ([...qs].length) url += '?' + qs;
  }

  appendLog(idx, `▶ ${method.toUpperCase()} ${url}`);
  statusEl.textContent = '요청 중...';

  try {
    const res = await fetch(url, opts);
    appendLog(idx, `◀ ${res.status} ${res.statusText}`);
    const ct = res.headers.get('content-type') || '';
    let result;

    if (ct.includes('application/json')) {
      result = await res.json();
      if (Array.isArray(result)) {
        result.forEach(item => {
          JSON.stringify(item, null, 2).split('\n').forEach(l => logBuffers[idx].push(l));
          logBuffers[idx].push('');
        });
        repaint(idx, true);
        statusEl.textContent = `완료: ${result.length.toLocaleString()}건`;
      } else {
        appendLog(idx, JSON.stringify(result, null, 2));
        statusEl.textContent = '완료';
      }
    } else {
      result = await res.text();
      appendLog(idx, result);
      statusEl.textContent = '완료';
    }
    addTimeline(idx, res.ok ? 'response' : 'error', `${res.status} ${res.statusText}`,
      { status: res.status, count: Array.isArray(result) ? result.length : 1 });
  } catch (err) {
    appendLog(idx, `⚠ ${err.message}`);
    statusEl.textContent = '오류';
    addTimeline(idx, 'error', 'network error', { error: err.message });
  }
}

// ── SSE 연결 ──────────────────────────────────────────────
async function sseConnect(idx, path, method) {
  disconnect(idx);
  logBuffers[idx] = [];

  let body;
  try { body = JSON.parse(document.getElementById(`body-${idx}`).value); }
  catch { alert("Invalid JSON"); return; }

  let resolvedPath = path;
  const queryParams = {};
  for (const [k, v] of Object.entries(body)) {
    if (resolvedPath.includes(`{${k}}`)) resolvedPath = resolvedPath.replace(`{${k}}`, encodeURIComponent(v));
    else queryParams[k] = v;
  }

  const params = new URLSearchParams(queryParams);
  params.append("_refresh", ++refreshKey);
  document.getElementById(`clear-${idx}`).style.display = 'block';
  appendLog(idx, "▶ CONNECTING (STREAM MODE)...");

  try {
    const ctrl = new AbortController();
    connections[idx] = ctrl;
    addTimeline(idx, 'open', 'open', { status: 'connected' });

    const res = await fetch(`${resolvedPath}?${params}`, { signal: ctrl.signal });
    if (!res.ok) {
      appendLog(idx, `⚠ HTTP ${res.status} ${res.statusText}\n${await res.text()}`);
      addTimeline(idx, 'error', 'http-error', { status: res.status });
      disconnect(idx); return;
    }
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    if (!ct.includes('text/event-stream')) {
      appendLog(idx, `⚠ Not SSE (content-type: ${ct || '(none)'})\n${await res.text()}`);
      addTimeline(idx, 'error', 'not-sse', { ct });
      disconnect(idx); return;
    }
    if (!res.body) {
      appendLog(idx, "⚠ Empty body");
      addTimeline(idx, 'error', 'empty-body', {});
      disconnect(idx); return;
    }

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) { appendLog(idx, "⏹ Server closed the stream"); disconnect(idx); break; }

      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();

      parts.forEach(msg => {
        if (!msg.trim()) return;
        let evName = 'message', data = '';
        msg.split('\n').forEach(line => {
          if (line.startsWith('event:'))      evName = line.slice(6).trim();
          else if (line.startsWith('data:'))  data  += line.slice(5).trim();
        });
        let parsed;
        try   { parsed = JSON.parse(data); appendLog(idx, `[${evName}] ${JSON.stringify(parsed, null, 2)}`); }
        catch { parsed = data;             appendLog(idx, `[${evName}] ${data}`); }
        addTimeline(idx,
          evName === 'error' ? 'error' : evName.includes('loading') ? 'loading' : 'response',
          evName, parsed);
        if (evName === 'response') disconnect(idx);
      });
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      appendLog(idx, "⚠ SSE error");
      addTimeline(idx, 'error', 'error', {});
      disconnect(idx);
    }
  }
}

// ── 유틸 ─────────────────────────────────────────────────
function disconnect(idx) {
  if (connections[idx]) {
    if (connections[idx].abort) connections[idx].abort();
    else if (connections[idx].close) connections[idx].close();
    connections[idx] = null;
    appendLog(idx, "⏹ Disconnected");
    addTimeline(idx, 'closed', 'closed', { closed: true });
  }
}

function clearLog(idx) {
  logBuffers[idx] = [];
  const box    = document.getElementById(`log-box-${idx}`);
  const spacer = document.getElementById(`log-spacer-${idx}`);
  if (box)    box.querySelectorAll('.log-line').forEach(el => el.remove());
  if (spacer) spacer.style.height = '0';
  document.getElementById(`clear-${idx}`).style.display = 'none';
  document.getElementById(`log-status-${idx}`).textContent = '';
  const tl = document.getElementById(`timeline-${idx}`);
  tl.innerHTML = ''; tl.style.display = 'none';
  eventStore[idx] = [];
}

function addTimeline(idx, type, label, payload) {
  const tl = document.getElementById(`timeline-${idx}`);
  tl.style.display = 'block';
  const ei = eventStore[idx].length;
  eventStore[idx].push(payload);
  const item = document.createElement('div');
  item.className = `timeline-item ${type}`;
  item.innerHTML  = `<span>${label}</span> <span style="color:#9ca3af">${new Date().toLocaleTimeString()}</span>`;
  item.onclick = () => {
    document.querySelectorAll(`#timeline-${idx} .timeline-item`).forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    logBuffers[idx] = JSON.stringify(eventStore[idx][ei], null, 2).split('\n');
    repaint(idx);
  };
  tl.appendChild(item);
}

function buildExample(parameters) {
  const r = {};
  parameters.forEach(p => {
    if      (p.type === 'string')  r[p.name] = p.in === 'path' ? `{${p.name}}` : '';
    else if (p.type === 'integer' || p.type === 'number') r[p.name] = 0;
    else if (p.type === 'boolean') r[p.name] = false;
    else                           r[p.name] = null;
  });
  return r;
}
</script>
</body>
</html>
